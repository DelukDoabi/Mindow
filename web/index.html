<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mindow">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mindow</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Firebase SDK for Web — required for firebase_messaging on Flutter Web (Story 5.1).
    Replace the firebaseConfig values below with those from Firebase Console:
    Project settings → Your apps → Web app → Config snippet.
  -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getMessaging } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-messaging.js";

    // TODO(boss): Replace placeholders with real values from Firebase Console
    const firebaseConfig = {
      apiKey: "REPLACE_WITH_WEB_API_KEY",
      authDomain: "REPLACE_WITH_PROJECT_ID.firebaseapp.com",
      projectId: "REPLACE_WITH_PROJECT_ID",
      storageBucket: "REPLACE_WITH_PROJECT_ID.firebasestorage.app",
      messagingSenderId: "REPLACE_WITH_MESSAGING_SENDER_ID",
      appId: "REPLACE_WITH_WEB_APP_ID",
      measurementId: "REPLACE_WITH_MEASUREMENT_ID",
    };

    const app = initializeApp(firebaseConfig);
    getMessaging(app);
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
